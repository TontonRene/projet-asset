<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThevertMenthe — Lobby Mario 64 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #hud { position: fixed; inset: 0; pointer-events: none; font-family: 'Josefin Sans', sans-serif; }
  .hud-label { position: absolute; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.4s; white-space: nowrap; text-align: center; }
  #label-art  { bottom: 100px; font-size: 14px; font-weight: 700; letter-spacing: 0.5em; color: rgba(200,150,10,0.9); text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
  #label-enter{ bottom: 72px;  font-size: 11px; letter-spacing: 0.45em; color: rgba(255,220,150,0.85); text-transform: lowercase; text-shadow: 1px 1px 2px black; }
  #controls { position: absolute; bottom: 24px; right: 24px; font-size: 10px; color: rgba(255,255,255,0.6); text-align: right; line-height: 1.8; text-shadow: 1px 1px 2px black; }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 100; }
  #loading { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; color: rgba(255,255,255,0.4); font-size: 11px; transition: opacity 0.6s; z-index: 99; }
  .loader-bar { width: 120px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
  .loader-fill { position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.4); animation: load 1.5s ease infinite; }
  @keyframes load { 0%{left:-100%} 100%{left:100%} }
</style>
</head>
<body>

<div id="loading">
  <span id="loading-text">i n i t i a l i s a t i o n</span>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="hud">
  <div class="hud-label" id="label-art"></div>
  <div class="hud-label" id="label-enter">E &nbsp;—&nbsp; e n t r e r</div>
  <div id="controls">↑ avancer · ↓ demi-tour · ← → tourner<br>espace sauter · E interagir · F lampe<br>(Clic souris pour les coordonnées)</div>
  <div id="flash"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.7.4/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ─── CONFIGURATION ────────────────────────────────────────────────────────────
const FBX_BASE = "./";
const MAP_URL = "./gallery_3_-_fitz_favourites.glb"; 
const SPAWN = { x: -639.05, y: 0, z: -418.69 };

// --- ZONES D'INTERACTION ---
const ZONES = [
    { 
        id: "photo1", 
        type: "mario_jump", 
        label: "P H O T O  0 1", 
        dest: "page-photo1.html", 
        x: -490, y: 87, z: -619, 
        ry: -1.57, // Orientation du tableau
        image: "photo1.png", width: 100, height: 75 
    }
];

// ─── INIT SCÈNE ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding; 
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8; 
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0500);

// --- CORRECTION : VRAIE LUMIÈRE GÉNÉRALE COSY ---
scene.add(new THREE.AmbientLight(0xffcc88, 0.6)); 

// Les 3 Spots pour ajouter du contraste et des reflets
function createCosySpot(x, y, z, tx, tz) {
    const spot = new THREE.SpotLight(0xffa050, 4, 800, 0.8, 1.0, 2);
    spot.position.set(x, y, z);
    spot.target.position.set(tx, 0, tz);
    scene.add(spot);
    scene.add(spot.target);
}
createCosySpot(SPAWN.x, 350, SPAWN.z, SPAWN.x, SPAWN.z);
createCosySpot(SPAWN.x + 150, 350, SPAWN.z - 100, SPAWN.x + 150, SPAWN.z - 100);
createCosySpot(SPAWN.x - 150, 350, SPAWN.z + 100, SPAWN.x - 150, SPAWN.z + 100);

// --- SHADER POUR L'EFFET DE VAGUE (RIPPLE) ---
const rippleShader = {
    vertexShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform float uRipple;
        void main() {
            vUv = uv;
            vec3 pos = position;
            if(uRipple > 0.0) {
                float d = distance(uv, vec2(0.5));
                pos.z += sin(d * 30.0 - uTime * 15.0) * uRipple * (1.0 - d);
            }
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        uniform sampler2D uTexture;
        void main() {
            gl_FragColor = texture2D(uTexture, vUv);
        }
    `
};

// --- GÉNÉRATEUR DE TABLEAUX ---
const textureLoader = new THREE.TextureLoader();
const paintings = [];

ZONES.forEach(zone => {
    if (zone.image) {
        textureLoader.load(FBX_BASE + zone.image, (tex) => {
            const geometry = new THREE.PlaneGeometry(zone.width, zone.height, 32, 32);
            const material = new THREE.ShaderMaterial({
                uniforms: { uTexture: { value: tex }, uTime: { value: 0 }, uRipple: { value: 0 } },
                vertexShader: rippleShader.vertexShader,
                fragmentShader: rippleShader.fragmentShader,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(zone.x, zone.y, zone.z);
            if (zone.ry !== undefined) mesh.rotation.y = zone.ry;
            scene.add(mesh);
            paintings.push({ mesh, id: zone.id });
        });
    }
});

// ─── PARTICULES DE PIEDS ──────────────────────────────────────────────────────
const dustCount = 25;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
const dustVel = new Float32Array(dustCount * 3);
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({ color: 0x6b533d, size: 5.0, transparent: true, opacity: 0 });
const dustMesh = new THREE.Points(dustGeo, dustMat);
scene.add(dustMesh);

// ─── CHARGEMENT MAP & COLLIDABLES (POUR LE RAYCASTING) ────────────────────────
let collidables = [];
const gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(MAP_URL, (gltf) => {
    scene.add(gltf.scene);
    gltf.scene.traverse(n => { if(n.isMesh) collidables.push(n); });
    document.getElementById("loading").style.opacity = "0";
    setTimeout(() => document.getElementById("loading").remove(), 600);
});

// ─── PERSONNAGE ───────────────────────────────────────────────────────────────
const charGroup = new THREE.Group();
charGroup.position.set(SPAWN.x, SPAWN.y, SPAWN.z);
scene.add(charGroup);

// --- LAMPE TORCHE ---
const flashlight = new THREE.SpotLight(0xffeedd, 10, 1000, 0.4, 0.5, 1.2);
flashlight.position.set(20, 130, -10); 
charGroup.add(flashlight);
flashlight.target.position.set(20, 110, -200); 
charGroup.add(flashlight.target);
flashlight.visible = false;

let mixer, actionIdle, actionWalk, actionJump, actionTurn, currentAction;
let charHeight = 150; 

const fbxLoader = new THREE.FBXLoader();
fbxLoader.load(FBX_BASE + "uploads_files_6510901_WOMAN-OFFICER.fbx", fbx => {
    fbx.scale.setScalar(1);
    fbx.rotation.y = Math.PI;
    charGroup.add(fbx);
    const bbox = new THREE.Box3().setFromObject(fbx);
    charHeight = bbox.max.y - bbox.min.y;
    mixer = new THREE.AnimationMixer(fbx);
    const load = (f, cb) => fbxLoader.load(FBX_BASE + f, a => cb(a.animations[0]));
    load("Idle.fbx", c => { actionIdle = mixer.clipAction(c); actionIdle.play(); currentAction = actionIdle; });
    load("Walking.fbx", c => { actionWalk = mixer.clipAction(c); });
    load("Jumping.fbx", c => { actionJump = mixer.clipAction(c); actionJump.setLoop(THREE.LoopOnce, 1); actionJump.clampWhenFinished = true; actionJump.timeScale = 0.6; });
    load("Walking Turn 180.fbx", c => { actionTurn = mixer.clipAction(c); actionTurn.setLoop(THREE.LoopOnce, 1); });
});

// ─── LOGIQUE DE JEU & PHYSIQUE ────────────────────────────────────────────────
const keys = {};
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (e.code === "KeyF") flashlight.visible = !flashlight.visible;
});
window.addEventListener("keyup", e => keys[e.code] = false);

let charYaw = 0, camYaw = 0, charY = 0, velY = 0, onGround = true, canJump = true;
let isTurning180 = false, turnTimer = 0, walkTimer = 0;
const SPD = 2.25, ROT_SPD = 0.04, GRAVITY = 0.4, JUMP_V = 5.25; 

const raycaster = new THREE.Raycaster();

let phase = "explore", phaseT = 0, activeZone = null;
const rfStartCam = new THREE.Vector3(), rfEndCam = new THREE.Vector3();
const rfStartChar = new THREE.Vector3();

function switchAnim(next, dur = 0.2) {
    if(!mixer || !next || next === currentAction) return;
    if(currentAction) currentAction.fadeOut(dur);
    next.reset().fadeIn(dur).play();
    currentAction = next;
}

function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;
    if(mixer) mixer.update(dt);
    const cp = charGroup.position;

    // Mise à jour de l'effet de vague des tableaux
    paintings.forEach(p => p.mesh.material.uniforms.uTime.value += dt);

    if (phase === "explore") {
        const fwd = keys["ArrowUp"] || keys["KeyW"];
        const back = keys["ArrowDown"] || keys["KeyS"];
        const left = keys["ArrowLeft"] || keys["KeyA"];
        const right = keys["ArrowRight"] || keys["KeyD"];
        const space = keys["Space"];

        if (back && !isTurning180 && onGround && actionTurn) {
            isTurning180 = true; turnTimer = 0; switchAnim(actionTurn);
        }

        if (isTurning180) {
            turnTimer += dt;
            camYaw += ((charYaw + Math.PI) - camYaw) * 0.08; 
            if (turnTimer >= actionTurn.getClip().duration - 0.2) {
                isTurning180 = false; charYaw += Math.PI; charGroup.rotation.y = charYaw;
                switchAnim(actionIdle);
            }
        } else {
            if(left) charYaw += ROT_SPD; if(right) charYaw -= ROT_SPD;
            charGroup.rotation.y = charYaw;
            camYaw += (charYaw - camYaw) * 0.1;

            let dx = 0, dz = 0;
            if(fwd) { dx -= Math.sin(charYaw)*SPD; dz -= Math.cos(charYaw)*SPD; }

            // --- COLLISIONS AU SOL ---
            if (dx !== 0 || dz !== 0) {
                walkTimer += dt;
                const rayOrigin = new THREE.Vector3(cp.x, cp.y + 50, cp.z);
                raycaster.set(rayOrigin, new THREE.Vector3(dx, 0, dz).normalize());
                const intersects = raycaster.intersectObjects(collidables, true);
                
                if (intersects.length === 0 || intersects[0].distance > 40) {
                    cp.x += dx; cp.z += dz;
                }
            } else { 
                walkTimer = 0; 
            }

            // --- SAUT CLASSIQUE ---
            if(space && onGround && canJump){ 
                velY = JUMP_V; 
                onGround = false; 
                canJump = false; 
                switchAnim(actionJump, 0.1); 
            }

            if(onGround && !isTurning180 && currentAction !== actionJump) {
                const target = (dx !== 0 || dz !== 0) ? actionWalk : actionIdle;
                if(currentAction !== target) switchAnim(target);
            }
        }

        // --- GRAVITÉ ---
        velY -= GRAVITY; 
        charY += velY;
        if(charY <= 0){ 
            charY = 0; 
            velY = 0; 
            if(!onGround){ 
                onGround = true; 
                canJump = true; 
                switchAnim(actionIdle, 0.1); 
            }
        }
        cp.y = charY;

        // --- PARTICULES DE PIEDS ---
        if (walkTimer > 1.0 && onGround) {
            dustMat.opacity = Math.min(dustMat.opacity + 0.05, 0.9);
            for(let i=0; i<dustCount*3; i+=3) {
                if (dustPos[i+1] <= 0) { 
                    dustPos[i] = cp.x + (Math.random()-0.5)*25;
                    dustPos[i+1] = 5;
                    dustPos[i+2] = cp.z + (Math.random()-0.5)*25;
                    dustVel[i+1] = Math.random() * 2;
                }
                dustPos[i+1] += dustVel[i+1]; dustVel[i+1] -= 0.1; 
            }
            dustGeo.attributes.position.needsUpdate = true;
        } else { dustMat.opacity = Math.max(dustMat.opacity - 0.1, 0); }

        // --- CORRECTION : CAMÉRA ANTI-OCCLUSION ---
        const idealDist = charHeight * 2.0;
        const targetCamPos = new THREE.Vector3(
            cp.x + Math.sin(camYaw) * idealDist, 
            cp.y + charHeight * 1.2, 
            cp.z + Math.cos(camYaw) * idealDist
        );
        
        // Le rayon part des épaules du personnage, pas de ses pieds !
        const headPos = new THREE.Vector3(cp.x, cp.y + charHeight * 0.8, cp.z);
        const camRayDir = new THREE.Vector3().subVectors(targetCamPos, headPos).normalize();
        const distToTarget = headPos.distanceTo(targetCamPos);

        raycaster.set(headPos, camRayDir);
        const camIntersects = raycaster.intersectObjects(collidables, true);
        
        if (camIntersects.length > 0 && camIntersects[0].distance < distToTarget) {
            const safeDist = Math.max(0, camIntersects[0].distance - 15);
            camera.position.copy(headPos).add(camRayDir.multiplyScalar(safeDist));
        } else {
            camera.position.lerp(targetCamPos, 0.1);
        }
        camera.lookAt(headPos);

        // --- INTERACTION ET DÉCLENCHEMENT MARIO ---
        activeZone = null;
        ZONES.forEach(z => { if(Math.hypot(cp.x-z.x, cp.z-z.z) < 150) activeZone = z; });
        document.getElementById("label-enter").style.opacity = activeZone ? "1" : "0";
        
        if (activeZone && keys["KeyE"] && onGround) {
            phase = "mario_zoom"; phaseT = 0;
            rfStartCam.copy(camera.position);
            rfEndCam.set(activeZone.x + Math.sin(activeZone.ry)*150, activeZone.y, activeZone.z + Math.cos(activeZone.ry)*150);
            rfStartChar.copy(cp);
            
            // Fait pivoter le personnage pour qu'il regarde le tableau IMMÉDIATEMENT
            charYaw = Math.atan2(activeZone.x - cp.x, activeZone.z - cp.z);
            charGroup.rotation.y = charYaw;
            
            switchAnim(actionIdle);
        }

    } else if (phase === "mario_zoom") {
        // CORRECTION : Zoom réduit de moitié (plus lent et cinématographique)
        phaseT += 0.02;
        camera.position.lerpVectors(rfStartCam, rfEndCam, Math.min(phaseT, 1));
        camera.lookAt(activeZone.x, activeZone.y, activeZone.z);
        if(phaseT >= 1) { phase = "mario_jump"; phaseT = 0; switchAnim(actionJump, 0.1); }

    } else if (phase === "mario_jump") {
        // Saut parabolique
        phaseT += 0.02;
        const t = Math.min(phaseT, 1);
        
        cp.x = rfStartChar.x + (activeZone.x - rfStartChar.x) * t;
        cp.z = rfStartChar.z + (activeZone.z - rfStartChar.z) * t;
        cp.y = Math.sin(t * Math.PI) * 100; // Cloche du saut

        // Vaguelette et disparition
        if (t > 0.8) {
            const pt = paintings.find(p => p.id === activeZone.id);
            if(pt) pt.mesh.material.uniforms.uRipple.value = 5.0; 
            charGroup.scale.setScalar(Math.max(0, 1 - (t-0.8)*5)); 
        }

        if(t >= 1) {
            document.getElementById("flash").style.opacity = "1";
            setTimeout(() => window.location.href = activeZone.dest, 500);
            phase = "done";
        }
    }

    renderer.render(scene, camera);
}

// ─── OUTIL DÉBOGAGE : LE SCANNER DE COORDONNÉES (AMÉLIORÉ) ───
const debugRaycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

const markerGeo = new THREE.SphereGeometry(3, 16, 16);
const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
const marker = new THREE.Mesh(markerGeo, markerMat);
scene.add(marker);

window.addEventListener('mousedown', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    debugRaycaster.setFromCamera(mouse, camera);
    const intersects = debugRaycaster.intersectObjects(collidables, true);
    
    if (intersects.length > 0) {
        const p = intersects[0].point;
        marker.position.copy(p); // Boule rouge
        console.log(`%c📍 CLIC DÉTECTÉ ! Copie ces valeurs :`, 'background: #222; color: #00ff00; font-size: 14px; font-weight: bold;');
        console.log(`x: ${Math.round(p.x)},  y: ${Math.round(p.y)},  z: ${Math.round(p.z)}`);
    }
});

animate();
</script>
</body>
</html>
